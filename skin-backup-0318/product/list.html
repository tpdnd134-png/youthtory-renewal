<script>
(function(){
    // 현재 정렬 상태를 URL에서 읽어 버튼 라벨 업데이트
    var sortMap = {'5':'등록순','1':'상품명순','3':'낮은가격순','4':'높은가격순','7':'후기순'};
    var params = new URLSearchParams(window.location.search);
    var current = params.get('sort_method');
    var btn = document.querySelector('.sort-current');
    if(btn && current && sortMap[current]) btn.textContent = sortMap[current];

    // 외부 클릭 시 드롭다운 닫기
    document.addEventListener('click', function(e){
        var wrap = document.querySelector('.sort-toggle-wrap');
        if(wrap && !wrap.contains(e.target)) wrap.classList.remove('open');
    });
})();
</script>
