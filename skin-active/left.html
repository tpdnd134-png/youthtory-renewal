<!-- SHOP: 카테고리 자동 연동 + 중분류 동적 로드 -->
<div class="gnb-item has-sub" module="Layout_category">
    <a href="/product/list.html{$param}" class="gnb-item-link">{$name}</a>
    <div class="gnb-mega">
        <div class="gnb-mega-inner gnb-sub-wrap"></div>
    </div>
</div>
<!-- COMMUNITY -->
<div class="gnb-item has-sub">COMMUNITY
    <div class="gnb-mega">
        <div class="gnb-mega-inner">
            <div class="gnb-mega-col">
                <a href="/board/free/list.html?board_no=1">Notice</a>
                <a href="/board/product/list.html?board_no=6">Q&A</a>
                <a href="/board/review/list.html?board_no=4">Review</a>
            </div>
        </div>
    </div>
</div>
<script>
/* PC 메가메뉴: 카페24 중분류 자동 로드 */
(function(){
    var cache={};
    function init(){
        document.querySelectorAll('.gnb-sub-wrap').forEach(function(wrap){
            var item=wrap.closest('.gnb-item');
            if(!item)return;
            var link=item.querySelector('.gnb-item-link');
            if(!link)return;
            item.addEventListener('mouseenter',function(){
                if(wrap.dataset.loaded)return;
                var href=link.getAttribute('href');
                var m=href.match(/cate_no=(\d+)/);
                if(!m)return;
                var no=m[1];
                if(cache[no]){renderMega(cache[no],wrap);return;}
                var xhr=new XMLHttpRequest();
                xhr.open('GET','/product/list.html?cate_no='+no,true);
                xhr.timeout=5000;
                xhr.onload=function(){
                    if(xhr.status!==200)return;
                    var doc=new DOMParser().parseFromString(xhr.responseText,'text/html');
                    var items=[];
                    doc.querySelectorAll('.xans-product-menupackage ul.menuCategory > li').forEach(function(li){
                        var a=li.querySelector(':scope > a');
                        if(a)items.push({name:a.textContent.trim(),href:a.getAttribute('href')});
                    });
                    cache[no]=items;
                    renderMega(items,wrap);
                };
                xhr.send();
            });
        });
    }
    function renderMega(items,wrap){
        if(!items.length)return;
        wrap.innerHTML='';
        var col=document.createElement('div');
        col.className='gnb-mega-col';
        items.forEach(function(it){
            var a=document.createElement('a');
            a.href=it.href;
            a.textContent=it.name;
            col.appendChild(a);
        });
        wrap.appendChild(col);
        wrap.dataset.loaded='1';
    }
    if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);
    else init();
})();
</script>
