<!-- Layout JS -->
<script type="text/javascript">
(function() {
    'use strict';

    // =========================================
    // Header Scroll Behavior
    // =========================================
    var header = document.getElementById('header');
    var lastScrollY = 0;
    var ticking = false;

    function onScroll() {
        var currentScrollY = window.pageYOffset || document.documentElement.scrollTop;

        // Add shadow/background when scrolled past 60px
        if (currentScrollY > 60) {
            header.classList.add('is-scrolled');
        } else {
            header.classList.remove('is-scrolled');
        }

        // Hide header on scroll down past 200px, show on scroll up
        if (currentScrollY > 200) {
            if (currentScrollY > lastScrollY) {
                header.classList.add('is-hidden');
            } else {
                header.classList.remove('is-hidden');
            }
        } else {
            header.classList.remove('is-hidden');
        }

        lastScrollY = currentScrollY;
        ticking = false;
    }

    window.addEventListener('scroll', function() {
        if (!ticking) {
            window.requestAnimationFrame(onScroll);
            ticking = true;
        }
    }, { passive: true });

    // =========================================
    // Mobile Navigation
    // =========================================
    var mobileNavWrap = document.getElementById('mobile-nav-wrap');
    var mobileNavBackdrop = document.getElementById('mobileNavBackdrop');
    var mobileNavToggle = document.getElementById('mobileNavToggle');
    var mobileNavClose = document.getElementById('mobileNavClose');

    function openMobileNav() {
        if (mobileNavWrap) {
            mobileNavWrap.classList.add('is-open');
            document.body.style.overflow = 'hidden';
        }
    }

    function closeMobileNav() {
        if (mobileNavWrap) {
            mobileNavWrap.classList.remove('is-open');
            document.body.style.overflow = '';
        }
    }

    if (mobileNavToggle) {
        mobileNavToggle.addEventListener('click', function(e) {
            e.preventDefault();
            if (mobileNavWrap && mobileNavWrap.classList.contains('is-open')) {
                closeMobileNav();
            } else {
                openMobileNav();
            }
        });
    }

    if (mobileNavClose) {
        mobileNavClose.addEventListener('click', function(e) {
            e.preventDefault();
            closeMobileNav();
        });
    }

    if (mobileNavBackdrop) {
        mobileNavBackdrop.addEventListener('click', function() {
            closeMobileNav();
        });
    }

    // =========================================
    // Search Overlay
    // =========================================
    var searchToggle = document.getElementById('searchToggle');
    var searchOverlay = document.getElementById('searchOverlay');
    var searchClose = document.getElementById('searchClose');

    function openSearch() {
        if (searchOverlay) {
            searchOverlay.classList.add('is-open');
            document.body.style.overflow = 'hidden';
            var searchInput = searchOverlay.querySelector('input[type="text"]');
            if (searchInput) {
                setTimeout(function() { searchInput.focus(); }, 100);
            }
        }
    }

    function closeSearch() {
        if (searchOverlay) {
            searchOverlay.classList.remove('is-open');
            document.body.style.overflow = '';
        }
    }

    if (searchToggle) {
        searchToggle.addEventListener('click', function(e) {
            e.preventDefault();
            openSearch();
        });
    }

    if (searchClose) {
        searchClose.addEventListener('click', function(e) {
            e.preventDefault();
            closeSearch();
        });
    }

    // =========================================
    // Scroll to Top
    // =========================================
    var scrollTopBtn = document.getElementById('scrollTopBtn');

    if (scrollTopBtn) {
        window.addEventListener('scroll', function() {
            if ((window.pageYOffset || document.documentElement.scrollTop) > 400) {
                scrollTopBtn.classList.add('is-visible');
            } else {
                scrollTopBtn.classList.remove('is-visible');
            }
        }, { passive: true });

        scrollTopBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    }

    // =========================================
    // ESC Key Handler
    // =========================================
    document.addEventListener('keydown', function(e) {
        if (e.key === 'Escape' || e.keyCode === 27) {
            closeMobileNav();
            closeSearch();
        }
    });

    // Expose functions globally for use in imported templates
    window.YOUTHTORY = {
        openMobileNav: openMobileNav,
        closeMobileNav: closeMobileNav,
        openSearch: openSearch,
        closeSearch: closeSearch
    };
})();
</script>
