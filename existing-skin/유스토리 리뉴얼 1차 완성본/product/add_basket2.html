<div module="Order_LayerBasketPackage" class="ec-base-layer yt-cart-drawer-layer">
    <!--@css(/css/module/product/basketAdd2.css)-->
    <script>
    function closeCartLayer() {
        var layer = document.getElementById('confirmLayer');
        if (layer) {
            layer.classList.remove('yt-cart-open');
            setTimeout(function() {
                layer.style.display = 'none';
                $('#confirmLayer').hide();
            }, 300);
        }
        $('.dimmed').hide();
        $('#mask').hide();
        $('[class*="dimmed"]').hide();
        document.body.style.overflow = '';
        document.documentElement.style.overflow = '';
    }
    // 열릴 때 애니메이션 트리거 — 즉시 실행 + setInterval 폴백
    (function() {
        function openLayer() {
            var layer = document.getElementById('confirmLayer');
            if (layer && layer.style.display !== 'none' && !layer.classList.contains('yt-cart-open')) {
                document.body.style.overflow = 'hidden';
                setTimeout(function() { layer.classList.add('yt-cart-open'); }, 30);
                return true;
            }
            return false;
        }
        // 즉시 시도
        if (!openLayer()) {
            // 폴백: 50ms 간격 체크 (최대 3초)
            var tries = 0;
            var timer = setInterval(function() {
                if (openLayer() || ++tries > 60) clearInterval(timer);
            }, 50);
        }
    })();
    </script>

    <!-- 드로어 헤더 -->
    <div class="yt-cart-header">
        <span class="yt-cart-title">장바구니</span>
        <button type="button" class="yt-cart-close" onclick="closeCartLayer()">
            <svg width="20" height="20" viewBox="0 0 20 20" fill="none" stroke="#111" stroke-width="1.5">
                <line x1="4" y1="4" x2="16" y2="16"/><line x1="16" y1="4" x2="4" y2="16"/>
            </svg>
        </button>
    </div>

    <!-- 상품 목록 -->
    <div class="yt-cart-body" module="Order_LayerBasket">
        <ul class="yt-cart-list" module="Order_list">
            <li class="yt-cart-item">
                <a href="/product/detail.html{$param}" class="yt-cart-item-img">
                    <img src="{$img}" onerror="this.src='//img.echosting.cafe24.com/thumb/img_product_small.gif';" alt="{$name_alt}" />
                </a>
                <div class="yt-cart-item-info">
                    <p class="yt-cart-item-name">{$product_name_link}</p>
                    <p class="yt-cart-item-option">{$option_str}</p>
                    <p class="yt-cart-item-price {$product_price_strike}">{$product_price}</p>
                    <p class="yt-cart-item-price-sale {$sale_price_display|display}"><strong>{$disp_sale_price}</strong></p>
                    <p class="yt-cart-item-qty">수량: {$quantity}</p>
                </div>
            </li>
            <li class="yt-cart-item">
                <a href="/product/detail.html{$param}" class="yt-cart-item-img">
                    <img src="{$img}" onerror="this.src='//img.echosting.cafe24.com/thumb/img_product_small.gif';" alt="{$name_alt}" />
                </a>
                <div class="yt-cart-item-info">
                    <p class="yt-cart-item-name">{$product_name_link}</p>
                    <p class="yt-cart-item-option">{$option_str}</p>
                    <p class="yt-cart-item-price {$product_price_strike}">{$product_price}</p>
                    <p class="yt-cart-item-price-sale {$sale_price_display|display}"><strong>{$disp_sale_price}</strong></p>
                    <p class="yt-cart-item-qty">수량: {$quantity}</p>
                </div>
            </li>
        </ul>
    </div>

    <!-- 하단 버튼 -->
    <div class="yt-cart-footer">
        <a href="/order/basket.html{$basket_param}" class="yt-cart-btn yt-cart-btn-outline">장바구니로 이동</a>
        <a href="#none" onclick="Basket.orderLayerAll(this)" link-order="/order/orderform.html?basket_type=all_buy" link-login="/member/login.html" class="yt-cart-btn yt-cart-btn-fill">바로 구매하기</a>
    </div>

    <!-- 기존 닫기 (숨김) -->
    <a class="close" onclick="closeCartLayer()" style="display:none;"><img src="//img.echosting.cafe24.com/skin/base/common/btn_close.gif" alt="닫기" /></a>
</div>
