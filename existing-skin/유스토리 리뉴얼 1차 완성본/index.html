<style>
/* ===== 메인 페이지 — pickysociety editorial style ===== */

/* 배너 — PC: 2분할 / 모바일: 1장 */
.hero-section { background: none !important; height: auto !important; min-height: 0 !important; }
.hero-split { display: flex !important; width: 100% !important; }
.hero-split-item { flex: 1 !important; position: relative !important; overflow: hidden !important; display: block !important; }
.hero-split-item img { width: 100% !important; height: 75vh !important; object-fit: cover !important; display: block !important; transition: transform 0.6s ease !important; }
.hero-split-item:hover img { transform: scale(1.03) !important; }
.hero-split-label { position: absolute !important; bottom: 40px !important; left: 50% !important; transform: translateX(-50%) !important; font-size: 14px !important; font-weight: 400 !important; letter-spacing: 0.2em !important; color: #fff !important; text-transform: uppercase !important; font-family: helvetica, 'Noto Sans KR', sans-serif !important; padding: 12px 32px !important; border: 1px solid rgba(255,255,255,0.5) !important; transition: all 0.4s ease !important; text-decoration: none !important; }
.hero-split-item:hover .hero-split-label { background: rgba(255,255,255,0.9) !important; color: #111 !important; border-color: #fff !important; }
.hero-mobile { display: none !important; position: relative !important; }
.hero-mobile img { width: 100% !important; height: 80vh !important; object-fit: cover !important; display: block !important; }

@media (max-width: 768px) {
    .hero-split { display: none !important; }
    .hero-mobile { display: block !important; }
}

/* 배너 Women/Men 버튼 */
.hero-gender-nav {
    position: absolute !important;
    bottom: 12% !important;
    left: 50% !important;
    transform: translateX(-50%) !important;
    display: flex !important;
    align-items: center !important;
    z-index: 10 !important;
}
.hero-gender-btn {
    display: inline-block !important;
    color: #fff !important;
    font-family: helvetica, 'Noto Sans KR', sans-serif !important;
    font-size: 13px !important;
    font-weight: 400 !important;
    letter-spacing: 0.15em !important;
    text-transform: uppercase !important;
    text-decoration: none !important;
    padding: 14px 36px !important;
    border: 1px solid rgba(255,255,255,0.5) !important;
    background: transparent !important;
    transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1) !important;
}
.hero-gender-btn:hover {
    background: rgba(255,255,255,0.95) !important;
    color: #111 !important;
    border-color: #fff !important;
    letter-spacing: 0.22em !important;
}
.hero-gender-divider {
    width: 1px !important;
    height: 16px !important;
    background: rgba(255,255,255,0.35) !important;
    display: inline-block !important;
}

/* Women/Men 토글 — 미니멀 pill 스타일 */
.gender-toggle {
    display: flex !important;
    justify-content: flex-start !important;
    gap: 0 !important;
    margin: 0 0 32px !important;
    padding: 0 20px !important;
}
.gender-toggle-btn {
    font-family: helvetica, 'Noto Sans KR', sans-serif !important;
    font-size: 13px !important;
    font-weight: 400 !important;
    letter-spacing: 0.15em !important;
    text-transform: uppercase !important;
    padding: 10px 24px !important;
    border: 1px solid #ddd !important;
    background: transparent !important;
    color: #bbb !important;
    cursor: pointer !important;
    transition: all 0.3s ease !important;
    outline: none !important;
}
.gender-toggle-btn:first-child { border-right: none !important; }
.gender-toggle-btn.active {
    color: #111 !important;
    border-color: #111 !important;
    font-weight: 500 !important;
}

/* 상품 영역 래퍼 */
.main-products {
    max-width: 1200px !important;
    margin: 0 auto !important;
    padding: 0 0 80px !important;
}
.main-products .grid4 {
    display: flex !important;
    flex-wrap: wrap !important;
    list-style: none !important;
    margin: 0 -4px !important;
    padding: 0 !important;
}
.main-products .grid4 > li {
    width: 25% !important;
    padding: 0 4px !important;
    margin-bottom: 32px !important;
    box-sizing: border-box !important;
}
.main-products .grid4 > li img,
.main-products .swiper-slide li img {
    width: 100% !important;
    height: auto !important;
    display: block !important;
}
.main-products .grid4 > li .name,
.main-products .swiper-slide li .name {
    font-size: 13px !important;
    font-weight: 400 !important;
    color: #212121 !important;
    margin: 10px 0 4px !important;
    letter-spacing: -0.01em !important;
}
.main-products .grid4 > li .name a,
.main-products .swiper-slide li .name a {
    text-decoration: none !important;
    color: #212121 !important;
}
.main-products .grid4 > li .prices,
.main-products .swiper-slide li .prices {
    font-size: 13px !important;
    color: #212121 !important;
    line-height: 1.4 !important;
    margin-top: 4px !important;
}
/* 판매가 (기본) */
.main-products .prices .normal { font-size: 13px !important; color: #212121 !important; font-weight: 500 !important; text-decoration: none !important; }
/* 할인가 — :not(:empty) 패턴 */
.main-products .prices .sale { display: none !important; }
.main-products .prices .sale:not(:empty) { display: inline !important; font-size: 12px !important; color: #c0392b !important; font-weight: 600 !important; order: 1 !important; }
.main-products .prices .sale:not(:empty) * { color: inherit !important; font-size: inherit !important; font-weight: inherit !important; }
/* 할인 존재 시 원가에 취소선 */
.main-products .prices .sale:not(:empty) + .normal { text-decoration: line-through !important; color: #bbb !important; font-weight: 400 !important; font-size: 11px !important; order: 2 !important; }
/* 할인 타이머 */
.main-products .discount-timer { display: none !important; margin-top: 4px !important; font-size: 11px !important; color: #999 !important; align-items: center !important; gap: 3px !important; }
.main-products .discount-timer:not(:empty) { display: flex !important; }
.main-products .discount-timer:not(:empty)::before { content: '⏱' !important; font-size: 11px !important; }
/* 할인율 */
.main-products .prices .sale-pct { font-size: 12px !important; color: #db7e7e !important; margin-right: 4px !important; font-weight: 500 !important; }
.main-products .loading {
    text-align: center !important;
    padding: 60px 0 !important;
    color: #999 !important;
    font-size: 13px !important;
    letter-spacing: 0.05em !important;
}

/* 스켈레톤 로딩 */
.skeleton-slide { padding: 0 4px !important; box-sizing: border-box !important; }
.skeleton-img {
    width: 100% !important; padding-top: 130% !important;
    background: linear-gradient(90deg, #f0f0f0 25%, #e0e0e0 50%, #f0f0f0 75%) !important;
    background-size: 200% 100% !important;
    animation: shimmer 1.5s infinite !important;
}
.skeleton-text {
    height: 13px !important; margin-top: 10px !important; width: 70% !important;
    background: #f0f0f0 !important; border-radius: 2px !important;
}
.skeleton-price {
    height: 13px !important; margin-top: 6px !important; width: 40% !important;
    background: #f0f0f0 !important; border-radius: 2px !important;
}
@keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
}

/* 모바일 */
@media (max-width: 768px) {
    .hero-gender-btn { font-size: 11px !important; padding: 11px 22px !important; }
    .hero-gender-nav { bottom: 10% !important; }
    .gender-toggle { margin-bottom: 24px !important; padding: 0 16px !important; }
    .gender-toggle-btn { font-size: 11px !important; padding: 9px 20px !important; }
    .main-products { padding: 0 0 60px !important; }
    .main-products .grid4 > li { width: 50% !important; }
}
/* 상품 가로 스크롤 — 큰 이미지 에디토리얼 */
.yt-scroll-grid {
    display: flex !important;
    overflow-x: auto !important;
    gap: 16px !important;
    padding: 0 20px 8px !important;
    margin: 0 !important;
    list-style: none !important;
    -webkit-overflow-scrolling: touch !important;
    scrollbar-width: none !important;
}
.yt-scroll-grid::-webkit-scrollbar { display: none !important; }
.yt-scroll-grid > li {
    flex: 0 0 calc(38vw - 16px) !important;
    position: relative !important;
    overflow: hidden !important;
}
.yt-scroll-grid > li .prdpadding { padding: 0 !important; }
.yt-scroll-grid > li .prdline {
    width: 100% !important;
    aspect-ratio: 3/4 !important;
    height: auto !important;
    overflow: hidden !important;
}
.yt-scroll-grid > li .prdline img {
    width: 100% !important; height: 100% !important;
    object-fit: cover !important; display: block !important;
    transition: transform 0.5s ease !important;
}
.yt-scroll-grid > li:hover .prdline img {
    transform: scale(1.04) !important;
}
.yt-scroll-grid > li .hoverimg,
.yt-scroll-grid > li .hoverimg a {
    display: block !important; width: 100% !important; height: 100% !important;
}
.yt-scroll-grid > li .name {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif !important;
    font-size: 13px !important; font-weight: 500 !important;
    color: #1d1d1f !important; margin: 12px 0 4px !important;
    line-height: 1.4 !important;
    letter-spacing: -0.2px !important;
}
.yt-scroll-grid > li .name a {
    text-decoration: none !important; color: #1d1d1f !important;
    font-weight: 500 !important;
}
.yt-scroll-grid > li .prices, .yt-scroll-grid > li .price {
    font-family: -apple-system, BlinkMacSystemFont, 'Noto Sans KR', sans-serif !important;
    font-size: 12px !important; color: #1d1d1f !important; font-weight: 500 !important;
    letter-spacing: -0.3px !important;
}
/* 할인가 — :not(:empty) 패턴 */
.yt-scroll-grid > li .prices .sale { display: none !important; }
.yt-scroll-grid > li .prices .sale:not(:empty) { display: inline !important; font-size: 12px !important; color: #c0392b !important; font-weight: 600 !important; }
.yt-scroll-grid > li .prices .sale:not(:empty) * { color: inherit !important; font-size: inherit !important; }
.yt-scroll-grid > li .prices .sale:not(:empty) + .normal { text-decoration: line-through !important; color: #bbb !important; font-weight: 400 !important; font-size: 11px !important; }
.yt-scroll-grid > li .prices .normal { font-size: 12px !important; color: #1d1d1f !important; font-weight: 500 !important; text-decoration: none !important; }
.yt-scroll-grid > li .colorWrap,
.yt-scroll-grid > li .info { display: none !important; }
.yt-scroll-grid > li .soldout-badge { display: none !important; }
/* 할인율 */
.yt-scroll-grid > li .sale-pct { font-size: 12px !important; color: #c0392b !important; margin-left: 4px !important; font-weight: 600 !important; }
.yt-scroll-grid > li .sale-pct:empty { display: none !important; }
/* 할인 타이머 */
.yt-scroll-grid > li .discount-timer { margin-top: 4px !important; font-size: 11px !important; color: #999 !important; display: flex !important; align-items: center !important; gap: 3px !important; }
.yt-scroll-grid > li .discount-timer.displaynone { display: none !important; }
/* 뱃지 — 상품목록과 동일 */
.yt-scroll-grid > li .prd-badges { display: flex !important; gap: 4px !important; margin-top: 6px !important; flex-wrap: wrap !important; }
.yt-scroll-grid > li .prd-badges .badge { display: inline-flex !important; align-items: center !important; justify-content: center !important; padding: 3px 10px !important; font-size: 10px !important; font-weight: 600 !important; letter-spacing: 0.04em !important; border-radius: 2px !important; line-height: 1 !important; }
.yt-scroll-grid > li .prd-badges .badge:empty { display: none !important; }
.yt-scroll-grid > li .prd-badges .badge img { display: none !important; }
.yt-scroll-grid > li .prd-badges .badge-new { border: 1px solid #212121 !important; color: #212121 !important; background: #fff !important; font-size: 0 !important; }
.yt-scroll-grid > li .prd-badges .badge-new:not(:empty)::after { content: 'NEW' !important; font-size: 10px !important; font-weight: 600 !important; }
.yt-scroll-grid > li .prd-badges .badge-sale { border: 1px solid #c0392b !important; color: #fff !important; background: #c0392b !important; }
.yt-scroll-grid > li .prd-badges .badge-sale.displaynone { display: none !important; }
.yt-scroll-grid > li .prd-badges .badge-hot { border: 1px solid #d4a574 !important; color: #fff !important; background: #d4a574 !important; font-size: 0 !important; }
.yt-scroll-grid > li .prd-badges .badge-hot:not(:empty)::after { content: 'HOT' !important; font-size: 10px !important; font-weight: 600 !important; }
.yt-scroll-grid > li .prd-keywords { display: none !important; }
.yt-scroll-grid > li .prd-keywords * { display: none !important; width: 0 !important; height: 0 !important; overflow: hidden !important; }
.yt-scroll-grid > li .prd-keywords:has(img[alt="품절"]) { display: flex !important; position: absolute !important; top: 0 !important; left: 0 !important; right: 0 !important; bottom: 0 !important; margin: 0 !important; z-index: 2 !important; pointer-events: none !important; background: rgba(255,255,255,0.55) !important; align-items: center !important; justify-content: center !important; }
.yt-scroll-grid > li .prd-keywords:has(img[alt="품절"])::after { content: 'SOLD OUT' !important; font-size: 13px !important; font-weight: 600 !important; letter-spacing: 0.15em !important; color: #999 !important; font-family: helvetica, 'Noto Sans KR', sans-serif !important; }

.yt-section-link {
    display: inline-block !important; margin-top: 0 !important;
    font-family: 'Noto Sans KR', sans-serif !important;
    font-size: 13px !important; color: #999 !important; font-weight: 300 !important;
    text-decoration: none !important; letter-spacing: 0.03em !important;
    transition: color 0.2s !important;
}
.yt-section-link:hover { color: #111 !important; }

/* 모바일 */
@media (max-width: 768px) {
    .yt-scroll-grid > li { flex: 0 0 38vw !important; }
    .yt-scroll-grid > li .prdline { width: 100% !important; aspect-ratio: 3/4 !important; height: auto !important; }
    .yt-scroll-grid > li .name { font-size: 12px !important; margin: 10px 0 3px !important; }
    .yt-scroll-grid > li .prices, .yt-scroll-grid > li .price { font-size: 12px !important; font-weight: 500 !important; }
}

var productCache = {};
var currentXhr = null;

function fetchAndRender(cateNo, gridId, max) {
    var grid = document.getElementById(gridId);
    if (!grid) return;
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '/product/list.html?cate_no=' + cateNo, true);
    xhr.timeout = 8000;
    xhr.onload = function() {
        if (xhr.status === 200) {
            try {
                var doc = new DOMParser().parseFromString(xhr.responseText, 'text/html');
                var ul = doc.querySelector('.xans-product-listnormal ul.grid4') || doc.querySelector('ul.grid4');
                if (ul) {
                    var items = ul.querySelectorAll('li');
                    var result = [];
                    for (var i = 0; i < items.length && result.length < max; i++) {
                        var img = items[i].querySelector('.prdline img, .hoverimg img');
                        if (!img || !img.src || img.src.indexOf('product') === -1) continue;
                        result.push(items[i].cloneNode(true));
                    }
                    productCache[cateNo] = result;
                    renderToGrid(gridId, result);
                }
            } catch(e) {}
        }
    };
    xhr.send();
    return xhr;
}

function renderToGrid(gridId, items) {
    var grid = document.getElementById(gridId);
    if (!grid) return;
    grid.innerHTML = '';
    for (var i = 0; i < items.length; i++) {
        var clone = items[i].cloneNode(true);
        var chips = clone.querySelector('.colorWrap');
        if (chips) chips.style.display = 'none';
        // 할인 가격 포맷: 인라인 스타일 제거 (CSS로 처리)
        var pricesEl = clone.querySelector('.prices');
        if(pricesEl){
            var spans = pricesEl.querySelectorAll('.sale, .normal, .price');
            spans.forEach(function(s){ s.removeAttribute('style'); });
        }
        grid.appendChild(clone);
    }
}

function loadProducts(cateNo) {
    if (currentXhr) { currentXhr.abort(); currentXhr = null; }
    if (productCache[cateNo]) {
        renderToGrid('productGrid', productCache[cateNo]);
        return;
    }
    currentXhr = fetchAndRender(cateNo, 'productGrid', 12);
}

// 페이지 로드
document.addEventListener('DOMContentLoaded', function() {
    loadProducts(150);
    // Men 미리 캐싱
    var preXhr = new XMLHttpRequest();
    preXhr.open('GET', '/product/list.html?cate_no=120', true);
    preXhr.onload = function() {
        if (preXhr.status === 200) {
            try {
                var doc = new DOMParser().parseFromString(preXhr.responseText, 'text/html');
                var ul = doc.querySelector('.xans-product-listnormal ul.grid4') || doc.querySelector('ul.grid4');
                if (ul) {
                    var items = ul.querySelectorAll('li');
                    var result = [];
                    for (var i = 0; i < items.length && result.length < 12; i++) {
                        var img = items[i].querySelector('.prdline img, .hoverimg img');
                        if (!img || !img.src || img.src.indexOf('product') === -1) continue;
                        result.push(items[i].cloneNode(true));
                    }
                    productCache[120] = result;
                }
            } catch(e) {}
        }
    };
    preXhr.send();
    // Best Item — Women 기본 로드
    fetchAndRender(138, 'bestGrid', 12);
});

// Women/Men 토글 (New Arrival + Best Item 공용)
document.querySelectorAll('.gender-toggle-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
        var section = this.dataset.section;
        var gridId = this.dataset.grid;
        var cateNo = this.dataset.cate;
        // 같은 섹션의 버튼만 토글
        this.parentElement.querySelectorAll('.gender-toggle-btn').forEach(function(b) { b.classList.remove('active'); });
        this.classList.add('active');
        if (section === 'new') {
            loadProducts(cateNo);
            // 쇼핑하기 링크 업데이트
            var link = document.getElementById('newLink');
            if (link) link.href = '/product/list.html?cate_no=' + cateNo;
        } else if (section === 'best') {
            fetchAndRender(parseInt(cateNo), gridId, 12);
            var link = document.getElementById('bestLink');
            if (link) link.href = '/product/list.html?cate_no=' + cateNo;
        }
    });
});
</script>
