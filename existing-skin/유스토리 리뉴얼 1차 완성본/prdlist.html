<li id="anchorBoxId_{$product_no}" data-product-no="{$product_no}">
    <div class="prdpadding">
        <div class="prdline hoverimg"><a href="/product/detail.html{$param}"><img src="{$image_medium}" width=100%  /></a><div class="soldout-badge">{$soldout_icon}</div></div>

    	<div class="colorWrap">
            <div class="color {$colorchip_display|display}">
                <div module="product_Colorchip">
                    <ul>
                        <li class="chips" style="background-color:{$color}"></li>
                        <li class="chips" style="background-color:{$color}"></li>
                    </ul>
                </div>
            </div>
        </div>

        <p class="name"><a href="/product/detail.html{$param}">{$product_name}</a></p>
    	<p class="prices"><span class="price normal{$prd_price_sale}">{$disp_product_price}</span><span class="price normal {$prd_price_sale|display}">{$prd_price_sale}</span><span class="sale-pct"></span></p>
    	<p class="discount-timer {$product_promotion_display|display}"><span class="timer-icon">⏱</span> <span class="timer-text">{$product_promotion_date}</span></p>
    	<p class="info {$summary_desc|display}">{$summary_desc}</p>

    	<div class="prd-badges">
    	    <span class="badge badge-new">{$new_icon}</span>
    	    <span class="badge badge-sale {$prd_price_sale|display}">SALE</span>
    	    <span class="badge badge-hot">{$recommend_icon}</span>
    	</div>

    	<div class="prd-keywords">{$soldout_icon}{$stock_icon}{$recommend_icon}{$new_icon}{$product_icons}{$benefit_icons}</div>
    </div>
</li>
