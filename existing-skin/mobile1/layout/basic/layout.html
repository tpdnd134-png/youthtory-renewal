<style>
/* ===== YOUTHTORY Mobile Global ===== */
* { box-sizing: border-box; }
body { font-family: helvetica, 'Noto Sans KR', sans-serif; color: #212121; background: #fff; -webkit-font-smoothing: antialiased; margin: 0; padding: 0; }
a { color: #212121; text-decoration: none; transition: all 0.3s ease; }
img { max-width: 100%; height: auto; }
ul { list-style: none; margin: 0; padding: 0; }

/* 프로모션 바 — mobile compact */
.m-promo-bar { height: 28px; background: rgba(42,41,41,0.4); overflow: hidden; display: flex; align-items: center; }
.m-promo-track { display: flex; white-space: nowrap; animation: m-marquee 50s linear infinite; }
.m-promo-item { color: rgba(255,255,255,0.9); font-size: 10px; margin-right: 60px; letter-spacing: 0.02em; font-weight: 300; }
.m-promo-item a { color: rgba(255,255,255,0.9); text-decoration: none; }
@keyframes m-marquee { from { transform: translate3d(0,0,0); } to { transform: translate3d(-50%,0,0); } }

/* 모바일 섹션 타이틀 */
.m-section-title { text-align: center; padding: 48px 16px 24px; }
.m-section-title h2 { font-family: 'Unbounded', sans-serif; font-size: 24px; font-weight: 900; color: #212121; letter-spacing: -0.02em; text-transform: uppercase; margin: 0; line-height: 1; }
.m-section-title p { font-size: 10px; color: #aaa; margin-top: 8px; letter-spacing: 0.1em; text-transform: uppercase; }
</style>

    <div module="Layout_multishopShipping" class="ec-base-layer">

            <div class="content">
                <p class="desc">PLEASE SELECT THE DESTINATION COUNTRY AND LANGUAGE :</p>
                <div class="select">
                    <select module="Layout_multishopShippingCountrylist">
                        <option value="{$country_code}"{$country_default_selected}>SHIPPING TO : {$country_name}</option>
                        <option value="{$country_code}"{$country_default_selected}>SHIPPING TO : {$country_name}</option>
                    </select>
                </div>
                <div class="select">

                    </select>

            </div>

            </div>

    <div module="mobilequick_display">
